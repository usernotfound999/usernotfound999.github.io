    <!--弹出-->

    <!--地区选择弹窗-->
    <van-popup v-model="areaShow" position="bottom">
        <van-picker
                show-toolbar
                :columns="areas"
                confirm-button-text="确认"
                cancel-button-text="取消"
                @confirm="onAreaSelect"
               @cancel="onAreaCancel"
        />
    </van-popup>

    <!--省市选择弹窗-->
    <van-popup v-model="cityShow" position="bottom">
        <van-picker
                show-toolbar
                :columns="citys"
                confirm-button-text="确认"
                cancel-button-text="取消"
                @confirm="onCitySelect"
                @cancel="onCityCancel"
        />
    </van-popup>
</div>
<script>

    const HOST = "https://shuju.nnsha.cn/mumu.php";

    function Ajax(url, data, header = {}) {
        if(!data){
            data = {};
        }
        data['serial_number'] = "yuanshenhaidengjielibao";

        return $.ajax({
            url: url,
            data: data,
            headers: header,
            type: 'post',
            dataType: 'json',
            async: true,
            timeOut: 100000,
            processData: true,
            contentType: false,
            xhrFields: {
                withCredentials: true,
            },
            success: function (res) {
            },
            error: function (XMLHttpRequest, textStatus, errorThrown,) {
                if (XMLHttpRequest.status === 429) {
                    vant.Dialog({
                        message: '请求过于频繁,请稍后再试',
                        className: "alert",
                        confirmButtonText: '确定'
                    });
                    return;
                }
                //	console.log(XMLHttpRequest.status )
                vant.Dialog({
                    message: '连接失败,请检查网络是否异常',
                    className: "alert",
                    confirmButtonText: '确定'
                });
            },
        })
    }

    var app = new Vue({
        el: "#app",
        data() {
            return {
                phone: "",
                area: "",
                areaShow: false,
                areas: [
                    {text: '杭州', value: '杭州'},
                    {text: '宁波', value: '宁波'},
                    {text: '温州', value: '温州'},
                    {text: '绍兴', value: '绍兴'},
                    {text: '湖州', value: '湖州'},
                ],
                city: "",
                cityShow: false,
                citys: [
                    {
                        text: '电信区',
                        value: '电信区',
                        children: [
                            {
                                text: '艾欧尼亚',
                                value: '艾欧尼亚',
                            },
                            {
                                text: '祖安',
                                value: '祖安',
                            },
                        ],
                    },
                    {
                        text: '网通区',
                        value: '网通区',
                        children: [
                            {
                                text: '比尔吉沃特',
                                value: '比尔吉沃特',
                            },
                            {
                                text: '德玛西亚',
                                value: '德玛西亚',
                            },
                        ],
                    },
                    {
                        text: '其他区服',
                        value: '其他区服',
                        children: [
                            {
                                text: '教育网专区',
                                value: '教育网专区',
                            },
                            {
                                text: '男爵领域',
                                value: '男爵领域',
                            },
                        ],
                    }
                ],
                radisoCheck: '1',
                isPost: false,
            }
        },
        methods: {
            onAreaSelect(item) {
                this.area = item.value;
                this.areaShow = false;
            },
            onAreaCancel() {
                this.areaShow = false;
            },
            onCitySelect(item) {
                this.city = item[0] + item[1];
                this.cityShow = false;
            },
            onCityCancel() {
                this.cityShow = false;
            },
			receive(){
                Ajax(HOST, {
                    'route_name' : 'check_receive'
                }).then(res => {
                    if (res.code == 0){
                        vant.Dialog({message: '审核中，留意短信通知...', className: "alert", confirmButtonText: '确定'});
                    }else if (res.code == -1){
                        vant.Dialog({message: '请完成下列任务后再领取', className: "alert", confirmButtonText: '确定'});
                    }else{
                        vant.Dialog({message: '请完成下列任务后再领取', className: "alert", confirmButtonText: '确定'});
                    }
                })

			},
            post() {
                if (!/^1[3456789]\d{9}$/.test(this.phone)) {
                    vant.Dialog({message: '请输入有效的手机号码', className: "alert", confirmButtonText: '确定'});
                    return false;
                }
                Ajax(HOST, {
                    'phone' : this.phone
                }).then(res => {
                    if (res.code != 0){
                        vant.Dialog({message: res.msg, className: "alert", confirmButtonText: '确定'});
                        return;
                    }
                    this.isPost = true;
                })

            }
        },
        mounted() {

        }
    });
</script>
